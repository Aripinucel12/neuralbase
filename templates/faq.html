{% extends "base.html" %}
{% block title %}FAQ{% endblock %}
{% block content %}
<div class="page-header" style="position:relative;padding:3rem 0 2rem;text-align:center;">
    <h1 style="font-size:2.2rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.5rem;">❓ FAQ</h1>
    <p style="color:var(--text2);max-width:500px;margin:0 auto;">Pertanyaan yang sering ditanya tentang AI, LLM, dan penggunaannya.</p>
    <div style="margin-top:1rem;"><span class="last-updated">📅 Terakhir diperbarui: 2026-06-17</span></div>
</div>
{% for q in faqs %}
<div class="faq-item">
    <div class="faq-q">{{ q.question }}</div>
    <div class="faq-a">{{ q.answer | safe }}</div>
</div>
{% endfor %}
{% endblock %}
