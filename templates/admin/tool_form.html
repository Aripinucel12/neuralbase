{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if tool else 'Add' }} Tool{% endblock %}

{% block admin_content %}
<div class="admin-header">
    <h1>{{ 'Edit' if tool else 'Add' }} Tool</h1>
    <a href="{{ url_for('admin_tools') }}" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" value="{{ tool.name if tool else '' }}" required placeholder="e.g. Cursor">
        </div>
        <div class="form-group">
            <label>Slug *</label>
            <input type="text" name="slug" value="{{ tool.slug if tool else '' }}" required placeholder="e.g. cursor">
        </div>
        <div class="form-group">
            <label>Category *</label>
            <select name="category">
                <option value="coding" {{ 'selected' if tool and tool.category == 'coding' else '' }}>Coding</option>
                <option value="image" {{ 'selected' if tool and tool.category == 'image' else '' }}>Image Generation</option>
                <option value="writing" {{ 'selected' if tool and tool.category == 'writing' else '' }}>Writing</option>
                <option value="chat" {{ 'selected' if tool and tool.category == 'chat' else '' }}>Chat</option>
            </select>
        </div>
        <div class="form-group">
            <label>URL</label>
            <input type="text" name="url" value="{{ tool.url if tool else '' }}" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Logo URL</label>
            <input type="text" name="logo_url" value="{{ tool.logo_url if tool else '' }}" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Deskripsi tool...">{{ tool.description if tool else '' }}</textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>Pricing</label>
                <input type="text" name="pricing" value="{{ tool.pricing if tool else '' }}" placeholder="e.g. Free / $20/mo">
            </div>
            <div class="form-group">
                <label>Rating (0-5)</label>
                <input type="number" name="rating" value="{{ tool.rating if tool else 0 }}" min="0" max="5" step="0.1">
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>Sort Order</label>
                <input type="number" name="sort_order" value="{{ tool.sort_order if tool else 0 }}">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <div class="form-checkbox">
                    <input type="checkbox" name="is_active" {{ 'checked' if not tool or tool.is_active else '' }}>
                    <span style="font-size:0.875rem;">Active</span>
                </div>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Save</button>
            <a href="{{ url_for('admin_tools') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
