{% extends "admin/base_admin.html" %}
{% block title %}{{ 'Edit' if faq else 'Add' }} FAQ{% endblock %}

{% block admin_content %}
<div class="admin-header">
    <h1>{{ 'Edit' if faq else 'Add' }} FAQ</h1>
    <a href="{{ url_for('admin_faq') }}" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Question *</label>
            <input type="text" name="question" value="{{ faq.question if faq else '' }}" required placeholder="e.g. Apa itu NeuralBase?">
        </div>
        <div class="form-group">
            <label>Answer *</label>
            <textarea name="answer" required placeholder="Jawaban...">{{ faq.answer if faq else '' }}</textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>Sort Order</label>
                <input type="number" name="sort_order" value="{{ faq.sort_order if faq else 0 }}">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <div class="form-checkbox">
                    <input type="checkbox" name="is_active" {{ 'checked' if not faq or faq.is_active else '' }}>
                    <span style="font-size:0.875rem;">Active</span>
                </div>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Save</button>
            <a href="{{ url_for('admin_faq') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
